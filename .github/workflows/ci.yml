name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hourden
          POSTGRES_PASSWORD: hourden
          POSTGRES_DB: hourden
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hourden -d hourden"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://hourden:hourden@localhost:5432/hourden
      HOURDEN_OPERATOR_EMAIL: operator@test.hourden.local
      HOURDEN_OPERATOR_PASSWORD: TestPass1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - run: npm run verify:build

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start API and Postgres
        run: docker compose up --build -d --wait

      - name: Verify API health
        run: |
          curl --fail --retry 10 --retry-delay 2 --retry-all-errors \
            http://localhost:3001/health | tee health.json
          grep -q '"ok":true' health.json

      - name: Verify seeded workspace row
        run: |
          docker compose exec -T postgres \
            psql -U hourden -d hourden -tAc \
            "SELECT count(*) FROM workspaces WHERE id = 'a0000000-0000-4000-8000-000000000001';" \
            | grep -q '^1$'

      - name: Tear down
        if: always()
        run: docker compose down -v
