services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hourden
      POSTGRES_PASSWORD: hourden
      POSTGRES_DB: hourden
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hourden -d hourden"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://hourden:hourden@postgres:5432/hourden
      PORT: 3001
      HOURDEN_API_KEY: ${HOURDEN_API_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
